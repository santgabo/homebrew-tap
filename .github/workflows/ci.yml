name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-formulae:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main
      - name: Audit formulae
        run: |
          for formula in Formula/*.rb; do
            brew audit --strict "santgabo/tap/$(basename "$formula" .rb)"
          done
      - name: Install and test formulae
        run: |
          for formula in Formula/*.rb; do
            name="santgabo/tap/$(basename "$formula" .rb)"
            brew install "$name"
            brew test "$name"
          done
