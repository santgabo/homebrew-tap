name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-formulae:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main
      - name: Link local tap
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/santgabo"
          ln -sfn "${{ github.workspace }}" "$(brew --repository)/Library/Taps/santgabo/homebrew-tap"
      - name: Audit formulae
        run: |
          for formula in Formula/*.rb; do
            brew audit --strict "$(basename "$formula" .rb)"
          done
      - name: Install and test formulae
        run: |
          for formula in Formula/*.rb; do
            name="$(basename "$formula" .rb)"
            brew install "santgabo/tap/$name"
            brew test "$name"
          done
      - name: Remove local tap link
        if: always()
        run: rm -f "$(brew --repository)/Library/Taps/santgabo/homebrew-tap"
